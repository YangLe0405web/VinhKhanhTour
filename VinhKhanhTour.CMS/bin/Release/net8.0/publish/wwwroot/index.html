<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinhKhanhTour</title>
    <base href="/" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VinhKhanhTour.CMS.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />

    <!-- Leaflet — CSS + JS phải cùng ở <head> để sẵn sàng trước khi Blazor gọi initMap() -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <!-- App -->
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <!-- Error -->
    <div id="blazor-error-ui">
        An error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor -->
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!-- ===================== -->
    <!-- 📥 DOWNLOAD -->
    <!-- ===================== -->
    <script>
        // Dùng cho nút "Tải QR PNG" trong Tours.razor
        window.downloadBase64File = (base64Data, fileName) => {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = fileName;
            link.click();
        };
    </script>

    <!-- ===================== -->
    <!-- 🔊 AUDIO -->
    <!-- ===================== -->
    <script>
        window.playAudio = (url) => {
            try {
                if (window._audio) {
                    window._audio.pause();
                }

                window._audio = new Audio(url);
                window._audio.play();
            } catch (e) {
                console.log("Audio error:", e);
            }
        };
    </script>

    <!-- ===================== -->
    <!-- 🗺️ MAP -->
    <!-- ===================== -->
    <script>
        window.initMap = (lat, lng) => {

            // Xóa map cũ nếu có
            if (window._map) {
                window._map.remove();
            }

            // Tạo map mới
            var map = L.map('map').setView([lat, lng], 18);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            // Marker user
            var marker = L.marker([lat, lng]).addTo(map);

            window._map = map;
            window._marker = marker;
        };
    </script>
    <script>
        window._poiMarkers = {};

        window.addPois = (pois) => {
            pois.forEach(p => {
                const marker = L.marker([p.latitude, p.longitude])
                    .addTo(window._map)
                    .bindPopup(p.name);

                window._poiMarkers[p.id] = marker;
            });
        };

        window.highlightPoi = (id) => {
            Object.values(window._poiMarkers).forEach(m => {
                m.setOpacity(0.5);
            });

            if (window._poiMarkers[id]) {
                window._poiMarkers[id].setOpacity(1);
                window._poiMarkers[id].openPopup();
            }
        };
    </script>

    <!-- ===================== -->
    <!-- 📍 GPS TRACKING -->
    <!-- ===================== -->
    <script>
        window.startGpsTracking = (dotnetRef) => {

            if (!navigator.geolocation) {
                alert("GPS không hỗ trợ");
                return;
            }

            navigator.geolocation.watchPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;

                    console.log("GPS:", lat, lng);

                    // Update marker
                    if (window._marker) {
                        window._marker.setLatLng([lat, lng]);
                    }

                    // Move map theo user
                    if (window._map) {
                        window._map.setView([lat, lng], 18);
                    }

                    // Gọi về C#
                    dotnetRef.invokeMethodAsync("OnLocationChanged", lat, lng);
                },
                err => {
                    console.log("GPS error:", err);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 5000
                }
            );
        };
    </script>

</body>

</html>
