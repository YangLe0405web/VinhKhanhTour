<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinhKhanhTour.CMS</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VinhKhanhTour.CMS.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Heatmap plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <body>
        <div id="app">
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>

        <div id="blazor-error-ui">
            An unhandled error has occurred.
            <a href="" class="reload">Reload</a>
            <a class="dismiss">🗙</a>
        </div>
        <script src="_framework/blazor.webassembly.js"></script>
        <script src="_content/MudBlazor/MudBlazor.min.js"></script>
        <script>
            window.downloadBase64File = (base64Data, fileName) => {
                const link = document.createElement('a');
                link.href = base64Data;
                link.download = fileName;
                link.click();
            };
        </script>
        <script>
            // ── Heatmap ──────────────────────────────────
            window.initHeatmap = (points) => {
                if (window._heatmapInstance) {
                    window._heatmapInstance.remove();
                }
                const map = L.map('heatmap').setView([10.7585, 106.7053], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                const heat = L.heatLayer(
                    points.map(p => [p.lat, p.lng, 1.0]),
                    { radius: 25, blur: 15, maxZoom: 17 }
                ).addTo(map);
                window._heatmapInstance = map;
            };

            // ── Trace Map ────────────────────────────────
            window.initTraceMap = (sessions) => {
                if (window._traceMapInstance) {
                    window._traceMapInstance.remove();
                }
                const map = L.map('tracemap').setView([10.7585, 106.7053], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
                sessions.forEach((session, i) => {
                    if (session.length < 2) return;
                    const latlngs = session.map(p => [p.lat, p.lng]);
                    L.polyline(latlngs, {
                        color: colors[i % colors.length],
                        weight: 3,
                        opacity: 0.7
                    }).addTo(map);
                    // Điểm bắt đầu
                    L.circleMarker(latlngs[0], {
                        radius: 6, color: '#27ae60', fillOpacity: 1
                    }).addTo(map);
                    // Điểm kết thúc
                    L.circleMarker(latlngs[latlngs.length - 1], {
                        radius: 6, color: '#e74c3c', fillOpacity: 1
                    }).addTo(map);
                });
                window._traceMapInstance = map;
            };

            // ── Download ─────────────────────────────────
            window.downloadBase64File = (base64Data, fileName) => {
                const link = document.createElement('a');
                link.href = base64Data;
                link.download = fileName;
                link.click();
            };
        </script>
    </body>

</html>
