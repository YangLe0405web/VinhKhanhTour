<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuyết Minh — Vĩnh Khánh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1A237E 0%, #4A148C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .brand {
            color: #1A237E;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .poi-name {
            font-size: 26px;
            font-weight: 700;
            color: #1A237E;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .poi-category {
            display: inline-block;
            background: #EDE7F6;
            color: #6A1B9A;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .lang-detected {
            background: #E8F5E9;
            color: #2E7D32;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: #F3E5F5;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

            .lang-btn.active {
                background: #6A1B9A;
                color: white;
                border-color: #6A1B9A;
            }

            .lang-btn:hover:not(.active) {
                border-color: #6A1B9A;
            }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6A1B9A, #1A237E);
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(106,27,154,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

            .play-btn:hover {
                transform: scale(1.08);
            }

            .play-btn:active {
                transform: scale(0.96);
            }

            .play-btn.speaking {
                background: linear-gradient(135deg, #e53935, #b71c1c);
                box-shadow: 0 8px 24px rgba(229,57,53,0.4);
                animation: pulse 1.2s infinite;
            }

        @keyframes pulse {
            0%,100% {
                box-shadow: 0 8px 24px rgba(229,57,53,0.4);
            }

            50% {
                box-shadow: 0 8px 36px rgba(229,57,53,0.7);
            }
        }

        .status {
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
            min-height: 20px;
        }

            .status.speaking {
                color: #6A1B9A;
                font-weight: 600;
            }

        .script-box {
            background: #F8F5FF;
            border-left: 4px solid #6A1B9A;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            max-height: 180px;
            overflow-y: auto;
        }

        .footer {
            margin-top: 24px;
            color: #bbb;
            font-size: 11px;
        }

        .loading {
            color: #888;
            font-size: 16px;
            padding: 40px 0;
        }

        .error {
            color: #e53935;
            font-size: 15px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🍜</div>
        <div class="brand">Phố Vĩnh Khánh</div>
        <div id="loading" class="loading">⏳ Đang tải thông tin...</div>
        <div id="error" class="error" style="display:none"></div>
        <div id="content" style="display:none">
            <div class="poi-name" id="poi-name"></div>
            <div class="poi-category" id="poi-cat"></div>
            <div class="lang-detected" id="lang-detected"></div>
            <div class="lang-selector" id="lang-selector"></div>
            <button class="play-btn" id="play-btn" onclick="toggleSpeak()">▶</button>
            <div class="status" id="status">Bấm để nghe thuyết minh</div>
            <div class="script-box" id="script-box"></div>
        </div>
        <div class="footer">🔊 Powered by VinhKhanhTour</div>
    </div>

    <script>
        const API = 'https://vinhkhanh-api.onrender.com';
        const pathParts = window.location.pathname.split('/');
        const poiId = pathParts[pathParts.length - 1];

        const LANGS = {
            vi: { label: '🇻🇳 Việt', tts: 'vi-VN' },
            en: { label: '🇬🇧 English', tts: 'en-US' },
            zh: { label: '🇨🇳 中文', tts: 'zh-CN' },
            ja: { label: '🇯🇵 日本', tts: 'ja-JP' },
            ko: { label: '🇰🇷 한국어', tts: 'ko-KR' },
        };

        function detectLang() {
            const browserLang = (navigator.language || 'vi').toLowerCase().split('-')[0];
            return LANGS[browserLang] ? browserLang : 'vi';
        }

        function getDeviceName() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/.test(ua)) return 'iOS Web';
            if (/Android/.test(ua)) return 'Android Web';
            return 'Web';
        }

        let poiData = null;
        let currentLang = detectLang();
        let isSpeaking = false;

        async function loadPoi() {
            try {
                const res = await fetch(`${API}/api/pois`);
                if (!res.ok) throw new Error();
                const pois = await res.json();
                poiData = pois.find(p => p.id === poiId);

                if (!poiData) { showError('Không tìm thấy điểm tham quan này.'); return; }

                if (!poiData.content?.[currentLang]) {
                    currentLang = poiData.content?.['vi'] ? 'vi'
                        : Object.keys(poiData.content || {})[0] || 'vi';
                }

                renderPoi();

                // Tăng lượt quét counter
                fetch(`${API}/api/pois/${poiId}/scan`, { method: 'POST' }).catch(() => { });

                // ── Ghi lịch sử quét QR vào api/history ──────────────────────
                fetch(`${API}/api/history`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'scan_qr',
                        poiId: poiData.id,
                        poiName: poiData.name,
                        language: currentLang,
                        device: getDeviceName(),
                        timestamp: new Date().toISOString()
                    })
                }).catch(() => { });

                // Tự động phát sau 1s
                setTimeout(speak, 1000);

            } catch {
                showError('Không thể tải dữ liệu. Vui lòng kiểm tra kết nối mạng.');
            }
        }

        function renderPoi() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            const catEmoji = { food: '🍜', drink: '🥤', landmark: '🏛' };
            const catLabel = { food: 'Ẩm thực', drink: 'Đồ uống', landmark: 'Địa điểm' };

            document.getElementById('poi-name').textContent = poiData.name;
            document.getElementById('poi-cat').textContent =
                (catEmoji[poiData.category] || '📍') + ' ' +
                (catLabel[poiData.category] || poiData.category);

            const detected = document.getElementById('lang-detected');
            detected.textContent = `🌐 Tự động: ${LANGS[currentLang]?.label || currentLang}`;

            const selector = document.getElementById('lang-selector');
            selector.innerHTML = '';
            const available = Object.keys(LANGS).filter(l => poiData.content?.[l]);
            available.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'lang-btn' + (lang === currentLang ? ' active' : '');
                btn.textContent = LANGS[lang].label;
                btn.onclick = () => selectLang(lang);
                selector.appendChild(btn);
            });

            updateScript();
        }

        function updateScript() {
            const text = getScript();
            document.getElementById('script-box').textContent = text || '(Chưa có nội dung thuyết minh)';
            document.getElementById('lang-detected').textContent = `🌐 ${LANGS[currentLang]?.label || currentLang}`;
        }

        function getScript() {
            return poiData?.content?.[currentLang] || poiData?.content?.['vi'] || '';
        }

        function selectLang(lang) {
            if (isSpeaking) stopSpeak();
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === LANGS[lang]?.label);
            });
            updateScript();
            setStatus('Bấm ▶ để nghe thuyết minh bằng ' + (LANGS[lang]?.label || lang));
        }

        function speak() {
            if (!('speechSynthesis' in window)) { setStatus('⚠️ Trình duyệt không hỗ trợ giọng nói'); return; }
            const text = getScript();
            if (!text) { setStatus('⚠️ Chưa có nội dung thuyết minh'); return; }

            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = LANGS[currentLang]?.tts || 'vi-VN';
            utter.rate = 0.95;
            utter.pitch = 1.0;

            utter.onstart = () => {
                isSpeaking = true;
                document.getElementById('play-btn').textContent = '⏹';
                document.getElementById('play-btn').classList.add('speaking');
                setStatus('🔊 Đang đọc thuyết minh...', true);
            };
            utter.onend = utter.onerror = () => {
                isSpeaking = false;
                document.getElementById('play-btn').textContent = '▶';
                document.getElementById('play-btn').classList.remove('speaking');
                setStatus('✅ Hoàn thành — Bấm ▶ để nghe lại');
            };
            window.speechSynthesis.speak(utter);
        }

        function stopSpeak() {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            document.getElementById('play-btn').textContent = '▶';
            document.getElementById('play-btn').classList.remove('speaking');
            setStatus('Bấm để nghe thuyết minh');
        }

        function toggleSpeak() {
            if (isSpeaking) stopSpeak();
            else speak();
        }

        function setStatus(msg, speaking = false) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status' + (speaking ? ' speaking' : '');
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const el = document.getElementById('error');
            el.style.display = 'block';
            el.textContent = '⚠️ ' + msg;
        }

        loadPoi();
    </script>
</body>
</html>
