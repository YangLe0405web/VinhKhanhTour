<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuyết Minh — Vĩnh Khánh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1A237E 0%, #4A148C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .brand {
            color: #1A237E;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .poi-name {
            font-size: 26px;
            font-weight: 700;
            color: #1A237E;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .poi-category {
            display: inline-block;
            background: #EDE7F6;
            color: #6A1B9A;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .poi-desc {
            color: #555;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        /* Lang selector */
        .lang-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: #F3E5F5;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #6A1B9A;
            color: white;
            border-color: #6A1B9A;
        }

        .lang-btn:hover:not(.active) {
            border-color: #6A1B9A;
        }

        /* Play button */
        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6A1B9A, #1A237E);
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(106,27,154,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .play-btn:hover { transform: scale(1.08); }
        .play-btn:active { transform: scale(0.96); }
        .play-btn.speaking {
            background: linear-gradient(135deg, #e53935, #b71c1c);
            box-shadow: 0 8px 24px rgba(229,57,53,0.4);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(229,57,53,0.4); }
            50% { box-shadow: 0 8px 36px rgba(229,57,53,0.7); }
        }

        .status {
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
            min-height: 20px;
        }

        .status.speaking { color: #6A1B9A; font-weight: 600; }

        /* Script text */
        .script-box {
            background: #F8F5FF;
            border-left: 4px solid #6A1B9A;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            max-height: 180px;
            overflow-y: auto;
        }

        .footer {
            margin-top: 28px;
            color: #bbb;
            font-size: 11px;
        }

        .loading {
            color: #888;
            font-size: 16px;
            padding: 40px 0;
        }

        .error {
            color: #e53935;
            font-size: 15px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🍜</div>
    <div class="brand">Phố Vĩnh Khánh</div>

    <div id="loading" class="loading">⏳ Đang tải thông tin...</div>
    <div id="error"   class="error"   style="display:none"></div>

    <div id="content" style="display:none">
        <div class="poi-name"    id="poi-name"></div>
        <div class="poi-category" id="poi-cat"></div>
        <div class="poi-desc"    id="poi-desc"></div>

        <!-- Chọn ngôn ngữ -->
        <div class="lang-selector" id="lang-selector"></div>

        <!-- Nút phát -->
        <button class="play-btn" id="play-btn" onclick="toggleSpeak()">▶</button>
        <div class="status" id="status">Bấm để nghe thuyết minh</div>

        <!-- Nội dung thuyết minh -->
        <div class="script-box" id="script-box"></div>
    </div>

    <div class="footer">🔊 Powered by VinhKhanhTour</div>
</div>

<script>
// ── Lấy poiId từ URL ────────────────────────────────────────────────
// URL dạng: https://vinhkhanhtour.web.app/poi/vk_hai_san
const pathParts = window.location.pathname.split('/');
const poiId = pathParts[pathParts.length - 1];

const API = 'https://vinhkhanh-api.onrender.com';

// ── State ────────────────────────────────────────────────────────────
let poiData   = null;
let currentLang = 'vi';
let isSpeaking  = false;

// ── Load POI từ API ──────────────────────────────────────────────────
async function loadPoi() {
    try {
        const res = await fetch(`${API}/api/pois`);
        if (!res.ok) throw new Error('API lỗi');

        const pois = await res.json();
        poiData = pois.find(p => p.id === poiId);

        if (!poiData) {
            showError('Không tìm thấy điểm tham quan này.');
            return;
        }

        renderPoi();

        // Tăng lượt quét
        fetch(`${API}/api/pois/${poiId}/scan`, { method: 'POST' }).catch(() => {});

        // Tự động phát sau 1 giây
        setTimeout(() => speak(), 1000);

    } catch (e) {
        showError('Không thể tải dữ liệu. Vui lòng kiểm tra kết nối mạng.');
    }
}

// ── Render POI ───────────────────────────────────────────────────────
function renderPoi() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    const catEmoji = { food: '🍜', drink: '🥤', landmark: '🏛' };
    const catLabel = { food: 'Ẩm thực', drink: 'Đồ uống', landmark: 'Địa điểm' };

    document.getElementById('poi-name').textContent = poiData.name;
    document.getElementById('poi-cat').textContent =
        (catEmoji[poiData.category] || '📍') + ' ' + (catLabel[poiData.category] || poiData.category);

    // Danh sách ngôn ngữ có sẵn
    const langs = {
        vi: '🇻🇳 Tiếng Việt',
        en: '🇬🇧 English',
        zh: '🇨🇳 中文',
        ja: '🇯🇵 日本語',
        ko: '🇰🇷 한국어'
    };

    const selector = document.getElementById('lang-selector');
    selector.innerHTML = '';

    const available = Object.keys(langs).filter(l => poiData.content && poiData.content[l]);
    if (available.length === 0) available.push('vi'); // fallback

    available.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (lang === currentLang ? ' active' : '');
        btn.textContent = langs[lang] || lang;
        btn.onclick = () => selectLang(lang);
        selector.appendChild(btn);
    });

    updateScript();
}

function updateScript() {
    const text = getScript();
    document.getElementById('poi-desc').textContent =
        text ? text.substring(0, 100) + '...' : '';
    document.getElementById('script-box').textContent = text || '(Chưa có nội dung)';
}

function getScript() {
    if (!poiData?.content) return '';
    return poiData.content[currentLang]
        || poiData.content['vi']
        || '';
}

function selectLang(lang) {
    if (isSpeaking) stopSpeak();
    currentLang = lang;

    // Update active button
    document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.startsWith(
            { vi:'🇻🇳', en:'🇬🇧', zh:'🇨🇳', ja:'🇯🇵', ko:'🇰🇷' }[lang]
        ));
    });

    updateScript();
}

// ── Web Speech API TTS ────────────────────────────────────────────────
const langMap = { vi: 'vi-VN', en: 'en-US', zh: 'zh-CN', ja: 'ja-JP', ko: 'ko-KR' };

function speak() {
    if (!('speechSynthesis' in window)) {
        setStatus('⚠️ Trình duyệt không hỗ trợ đọc giọng nói');
        return;
    }

    const text = getScript();
    if (!text) { setStatus('⚠️ Chưa có nội dung thuyết minh'); return; }

    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langMap[currentLang] || 'vi-VN';
    utter.rate = 0.95;
    utter.pitch = 1.0;

    utter.onstart = () => {
        isSpeaking = true;
        document.getElementById('play-btn').textContent = '⏹';
        document.getElementById('play-btn').classList.add('speaking');
        setStatus('🔊 Đang đọc thuyết minh...', true);
    };

    utter.onend = utter.onerror = () => {
        isSpeaking = false;
        document.getElementById('play-btn').textContent = '▶';
        document.getElementById('play-btn').classList.remove('speaking');
        setStatus('✅ Hoàn thành — Bấm ▶ để nghe lại');
    };

    window.speechSynthesis.speak(utter);
}

function stopSpeak() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('play-btn').classList.remove('speaking');
    setStatus('Bấm để nghe thuyết minh');
}

function toggleSpeak() {
    if (isSpeaking) stopSpeak();
    else speak();
}

function setStatus(msg, speaking = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (speaking ? ' speaking' : '');
}

function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = '⚠️ ' + msg;
}

// ── Start ─────────────────────────────────────────────────────────────
loadPoi();
</script>
</body>
</html>
