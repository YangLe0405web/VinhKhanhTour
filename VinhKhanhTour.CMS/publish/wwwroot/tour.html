<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phố Ẩm Thực Vĩnh Khánh</title>
    <style>
        body {
            font-family: Arial;
            background: #1a237e;
            color: white;
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .poi-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #FFD54F;
            margin: 20px 0;
        }

        .desc {
            font-size: 0.95em;
            line-height: 1.6;
            opacity: 0.9;
            margin: 15px 0;
        }

        button {
            background: #E65100;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px;
            width: 80%;
        }

            button:disabled {
                opacity: 0.5;
            }

        .lang-btn {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            width: auto;
        }

        .lang-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .status {
            font-size: 0.85em;
            opacity: 0.7;
            margin-top: 10px;
        }

        .emoji {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🍜</div>
        <h1>Phố Ẩm Thực Vĩnh Khánh</h1>

        <div class="lang-bar" id="langBar"></div>

        <div class="poi-name" id="poiName">Đang tải...</div>
        <div class="desc" id="poiDesc"></div>

        <button id="btnSpeak" onclick="speak()">🔊 Nghe thuyết minh</button>
        <button onclick="stopSpeak()">⏹ Dừng</button>

        <div class="status" id="status"></div>
    </div>

    <script>
const API = 'https://vinhkhanh-api.onrender.com';
const langs = [
    { code: 'vi', flag: '🇻🇳', name: 'VI', tts: 'vi-VN' },
    { code: 'en', flag: '🇬🇧', name: 'EN', tts: 'en-US' },
    { code: 'zh', flag: '🇨🇳', name: '中文', tts: 'zh-CN' },
    { code: 'ja', flag: '🇯🇵', name: '日本語', tts: 'ja-JP' },
    { code: 'ko', flag: '🇰🇷', name: '한국어', tts: 'ko-KR' },
];

let currentLang = 'vi';
let currentPoi = null;
let utterance = null;

// Parse URL params
const params = new URLSearchParams(window.location.search);
const poiId = params.get('poi');
const action = params.get('action') || 'play';

// Build lang buttons
const langBar = document.getElementById('langBar');
langs.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.textContent = l.flag + ' ' + l.name;
    btn.onclick = () => { currentLang = l.code; updateDisplay(); };
    langBar.appendChild(btn);
});

// Load POI
async function loadPoi() {
    document.getElementById('status').textContent = 'Đang tải dữ liệu...';
    try {
        const res = await fetch(`${API}/api/pois`);
        const pois = await res.json();
        currentPoi = pois.find(p => p.id === poiId) || pois[0];
        updateDisplay();
        if (action === 'play') setTimeout(speak, 1000);
    } catch(e) {
        document.getElementById('status').textContent = 'Lỗi kết nối API';
    }
}

function updateDisplay() {
    if (!currentPoi) return;
    const name = currentPoi.name || 'POI';
    const content = currentPoi.content?.[currentLang] || currentPoi.content?.vi || '';
    document.getElementById('poiName').textContent = name;
    document.getElementById('poiDesc').textContent = content;
}

function speak() {
    if (!currentPoi) return;
    stopSpeak();
    const content = currentPoi.content?.[currentLang] || currentPoi.content?.vi || '';
    if (!content) { document.getElementById('status').textContent = 'Không có nội dung'; return; }

    const lang = langs.find(l => l.code === currentLang);
    utterance = new SpeechSynthesisUtterance(content);
    utterance.lang = lang?.tts || 'vi-VN';
    utterance.rate = 0.9;
    utterance.onstart = () => {
        document.getElementById('btnSpeak').disabled = true;
        document.getElementById('status').textContent = '🔊 Đang phát...';
    };
    utterance.onend = () => {
        document.getElementById('btnSpeak').disabled = false;
        document.getElementById('status').textContent = '';
    };
    speechSynthesis.speak(utterance);
}

function stopSpeak() {
    speechSynthesis.cancel();
    document.getElementById('btnSpeak').disabled = false;
    document.getElementById('status').textContent = '';
}

loadPoi();
    </script>
</body>
</html>
