<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinhKhanhTour CMS</title>
    <base href="/" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VinhKhanhTour.CMS.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/glass-theme.css" rel="stylesheet" />
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />

    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet.heat plugin -->
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
</head>

<body>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor -->
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/analytics_utils.js"></script>

    <!-- DOWNLOAD -->
    <script>
        window.downloadBase64File = (base64Data, fileName) => {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = fileName;
            link.click();
        };
    </script>

    <!-- AUDIO -->
    <script>
        window.playAudio = (url) => {
            try {
                if (window._audio) {
                    window._audio.pause();
                }
                window._audio = new Audio(url);
                window._audio.play();
            } catch (e) {
                console.log("Audio error:", e);
            }
        };
    </script>

    <!-- MAP UTILS -->
    <script>
        window.initMap = (lat, lng) => {
            if (window._map) window._map.remove();
            var map = L.map('map').setView([lat, lng], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([lat, lng]).addTo(map);
            window._map = map;
        };

        window.initHeatmap = (points) => {
            if (window._heatmap) window._heatmap.remove();
            var map = L.map('heatmap').setView([10.7613, 106.7047], 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            if (points && points.length > 0) {
                var heatData = points.map(p => [p.lat, p.lng, 0.6]);
                L.heatLayer(heatData, { radius: 25, blur: 20 }).addTo(map);
            }
            window._heatmap = map;
        };

        window.initTraceMap = (sessions) => {
            if (window._tracemap) window._tracemap.remove();
            var map = L.map('tracemap').setView([10.7613, 106.7047], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            var colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            
            if (sessions && sessions.length > 0) {
                sessions.forEach((points, i) => {
                    var coords = points.map(p => [p.lat, p.lng]);
                    var color = colors[i % colors.length];
                    L.polyline(coords, { color: color, weight: 4, opacity: 0.6 }).addTo(map);
                    
                    points.forEach(p => {
                        L.circleMarker([p.lat, p.lng], { radius: 3, fillColor: color, color: '#fff', weight: 1, opacity: 0.8, fillOpacity: 0.8 }).addTo(map);
                    });
                });
            }
            window._tracemap = map;
        };
    </script>

    <!-- TOUR EDITOR -->
    <script>
        window.initTourEditorMap = (dotnet) => {
            if (window._tourMap) window._tourMap.remove();
            
            // Map container: tour-map (cần khớp ID trong Razor)
            window._tourMap = L.map('tour-map').setView([10.7613, 106.7047], 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window._tourMap);
            
            window._tourMarkers = [];
            window._tourRouteLayer = null;

            window._tourMap.on('click', function(e) {
                if (window._tourMarkers.length >= 2) {
                    window._tourMarkers.forEach(m => window._tourMap.removeLayer(m));
                    window._tourMarkers = [];
                    if (window._tourRouteLayer) window._tourMap.removeLayer(window._tourRouteLayer);
                }

                const marker = L.circleMarker(e.latlng, {
                    radius: 10,
                    fillColor: window._tourMarkers.length === 0 ? "#10b981" : "#ef4444",
                    color: "#fff",
                    weight: 3,
                    fillOpacity: 1
                }).addTo(window._tourMap);
                
                window._tourMarkers.push(marker);

                if (window._tourMarkers.length === 2) {
                    const p1 = window._tourMarkers[0].getLatLng();
                    const p2 = window._tourMarkers[1].getLatLng();
                    dotnet.invokeMethodAsync("OnRouteSelected", p1.lat, p1.lng, p2.lat, p2.lng);
                }
            });
        };

        window.drawTourRoute = (coords) => {
            if (window._tourRouteLayer) window._tourMap.removeLayer(window._tourRouteLayer);
            window._tourRouteLayer = L.polyline(coords, { color: '#fb923c', weight: 6, opacity: 0.8 }).addTo(window._tourMap);
            window._tourMap.fitBounds(window._tourRouteLayer.getBounds(), { padding: [50, 50] });
        };

        window.downloadBase64File = (base64, fileName) => {
            var a = document.createElement("a");
            a.href = base64;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    </script>

</body>

</html>
